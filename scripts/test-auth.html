<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Auth Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: monospace; padding: 20px; max-width: 800px; margin: 0 auto; }
    button { margin: 10px 5px; padding: 10px 20px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 15px; overflow-x: auto; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <h1>Supabase OAuth 测试</h1>
  
  <div>
    <h2>1. 环境配置</h2>
    <div id="config"></div>
  </div>

  <div>
    <h2>2. 测试登录</h2>
    <button onclick="testGoogle()">🔍 Test Google OAuth</button>
    <button onclick="testGithub()">🔍 Test GitHub OAuth</button>
    <button onclick="checkSession()">Check Session</button>
    <button onclick="signOut()">Sign Out</button>
  </div>

  <div>
    <h2>3. 结果</h2>
    <pre id="output">等待操作...</pre>
  </div>

  <script>
    const SUPABASE_URL = 'https://pjjagnydudtemknjazjq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqamFnbnlkdWR0ZW1rbmphempxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzY4Mjc1NjIsImV4cCI6MjA1MjQwMzU2Mn0.WRn9aJ4x4t9pWBL5zLO0_vTQw2MDFIxNn8PRhE5kBXM';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        autoRefreshToken: true,
        persistSession: true,
        detectSessionInUrl: true,
        flowType: 'pkce'
      }
    });

    const output = document.getElementById('output');
    const configDiv = document.getElementById('config');

    // Display config
    configDiv.innerHTML = `
      <pre>URL: ${SUPABASE_URL}
Redirect: ${window.location.origin}/</pre>
    `;

    function log(message, type = 'info') {
      const timestamp = new Date().toISOString();
      const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
      output.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
      console.log(message);
    }

    async function testGoogle() {
      try {
        log('🚀 Initiating Google OAuth...');
        const { data, error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + '/',
          }
        });
        
        if (error) {
          log(`❌ Google OAuth error: ${error.message}`, 'error');
          log(JSON.stringify(error, null, 2), 'error');
        } else {
          log('✅ Google OAuth initiated', 'success');
          log(JSON.stringify(data, null, 2));
        }
      } catch (err) {
        log(`❌ Exception: ${err.message}`, 'error');
        console.error(err);
      }
    }

    async function testGithub() {
      try {
        log('🚀 Initiating GitHub OAuth...');
        const { data, error } = await supabase.auth.signInWithOAuth({
          provider: 'github',
          options: {
            redirectTo: window.location.origin + '/',
          }
        });
        
        if (error) {
          log(`❌ GitHub OAuth error: ${error.message}`, 'error');
          log(JSON.stringify(error, null, 2), 'error');
        } else {
          log('✅ GitHub OAuth initiated', 'success');
          log(JSON.stringify(data, null, 2));
        }
      } catch (err) {
        log(`❌ Exception: ${err.message}`, 'error');
        console.error(err);
      }
    }

    async function checkSession() {
      try {
        log('🔍 Checking session...');
        const { data: { session }, error } = await supabase.auth.getSession();
        
        if (error) {
          log(`❌ Session error: ${error.message}`, 'error');
        } else if (session) {
          log('✅ Active session found:', 'success');
          log(JSON.stringify({
            user: session.user.email,
            provider: session.user.app_metadata.provider,
            expires: new Date(session.expires_at * 1000).toISOString()
          }, null, 2), 'success');
        } else {
          log('ℹ️ No active session');
        }
      } catch (err) {
        log(`❌ Exception: ${err.message}`, 'error');
      }
    }

    async function signOut() {
      try {
        log('🚪 Signing out...');
        const { error } = await supabase.auth.signOut();
        if (error) {
          log(`❌ Sign out error: ${error.message}`, 'error');
        } else {
          log('✅ Signed out successfully', 'success');
        }
      } catch (err) {
        log(`❌ Exception: ${err.message}`, 'error');
      }
    }

    // Check for OAuth callback
    window.addEventListener('load', async () => {
      const hashParams = new URLSearchParams(window.location.hash.substring(1));
      const searchParams = new URLSearchParams(window.location.search);
      
      if (hashParams.has('access_token') || searchParams.has('code')) {
        log('🔄 OAuth callback detected, processing...');
        await checkSession();
      }
    });
  </script>
</body>
</html>
